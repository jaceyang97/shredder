<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Shredder 1.1</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%23c0c0c0'/><rect x='2' y='1' width='2' height='14' fill='%23c33'/><rect x='5' y='3' width='2' height='12' fill='%23338'/><rect x='8' y='0' width='2' height='16' fill='%23383'/><rect x='11' y='2' width='2' height='13' fill='%23000'/></svg>">
<style>
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
    background-color: #c0c0c0;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 13px;
  }
  /* ---- toolbar frame: faithful to the 1998 silver chrome ---- */
  #toolbar {
    flex: 0 0 66px;
    position: relative;
    background-color: #c0c0c0;
    border-top: 1px solid #eee;
    border-bottom: 6px solid #808080;
    box-sizing: border-box;
  }
  #shredder-logo {
    position: absolute;
    left: 16px;
    top: 8px;
    width: 76px;
    cursor: pointer;
    user-select: none;
  }
  #shredder-logo .word {
    font-family: Impact, 'Arial Black', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    color: #222;
    transform: skewX(-8deg);
    text-shadow: 1px 1px 0 #eee;
    line-height: 1;
  }
  #shredder-logo .strips {
    display: flex;
    gap: 2px;
    height: 18px;
    margin-top: 2px;
  }
  #shredder-logo .strips span {
    flex: 1;
  }
  #url-entry table {
    margin-left: 100px;
    margin-top: 4px;
    width: calc(100% - 170px);
    border: 0;
    border-collapse: collapse;
  }
  #url-entry table tr { height: 30px; }
  #url-entry td {
    font-size: 13px;
    color: #000;
    vertical-align: middle;
  }
  #url-entry td.lbl { text-align: right; padding-right: 2px; white-space: nowrap; }
  #url-entry a { color: #0020c0; text-decoration: none; }
  #url-entry a:hover { text-decoration: underline; }
  .input-wrapper {
    display: inline-block;
    padding: 1px;
    background-color: white;
    box-shadow: inset 1px 1px 0px 0px #777;
    margin-left: 4px;
  }
  td.grow { width: 100%; }
  td.grow .input-wrapper { display: block; }
  #url-entry input, #url-entry select {
    outline-style: none;
    border-top: 1px solid #333;
    border-left: 1px solid #333;
    border-right: 1px solid #e0e0e0;
    border-bottom: 1px solid #e0e0e0;
    padding: 1px;
    height: 21px;
    font-size: 13px;
    background: #fff;
    box-sizing: border-box;
  }
  #url-entry input {
    width: 100%;
    padding-left: 4px;
  }
  /* ---- spinner blade ---- */
  #shredder-spinner {
    position: absolute;
    width: 40px;
    height: 40px;
    right: 8px;
    top: 8px;
    cursor: pointer;
  }
  #shredder-spinner .blade {
    width: 40px;
    height: 40px;
    border: 1px solid #555;
    box-sizing: border-box;
    background:
      conic-gradient(#111 0 25%, #e8e8e8 25% 50%, #111 50% 75%, #e8e8e8 75%);
  }
  #shredder-spinner.spinning .blade {
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* ---- display frame ---- */
  #display-wrap {
    flex: 1 1 auto;
    position: relative;
    background: #fefefe;
  }
  #display {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
</style>
</head>
<body>

<div id="toolbar">
  <div id="shredder-logo" title="About the Shredder" onclick="goWelcome()">
    <div class="word">Shredder</div>
    <div class="strips">
      <span style="background:#c0392b"></span>
      <span style="background:#2c3e80"></span>
      <span style="background:#1e8449"></span>
      <span style="background:#111"></span>
      <span style="background:#b7950b"></span>
    </div>
  </div>

  <form id="url-entry" name="gotoForm" onsubmit="shredPage();return false;" action="#" method="GET">
    <table cellpadding="0" cellspacing="0">
      <tr>
        <td class="lbl">Location:</td>
        <td class="grow">
          <div class="input-wrapper">
            <input type="text" name="location" id="shred-url-input" spellcheck="false"
                   autocomplete="off" placeholder="www.example.com" onfocus="this.select();">
          </div>
        </td>
      </tr>
      <tr>
        <td class="lbl"><a href="#" onclick="goWelcome();return false;">Bookmarks:</a></td>
        <td>
          <div class="input-wrapper">
            <select name="bookmarks" id="bookmarks" onchange="shredBookmark();">
              <option value=""></option>
              <option value="" disabled>------- Most visited</option>
              <option value="www.google.com">Google</option>
              <option value="www.youtube.com">YouTube</option>
              <option value="www.facebook.com">Facebook</option>
              <option value="www.instagram.com">Instagram</option>
              <option value="www.reddit.com">Reddit</option>
              <option value="www.wikipedia.org">Wikipedia</option>
              <option value="x.com">X (Twitter)</option>
              <option value="www.amazon.com">Amazon</option>
              <option value="www.tiktok.com">TikTok</option>
              <option value="www.yahoo.com">Yahoo</option>
              <option value="" disabled></option>
              <option value="" disabled>------- AI</option>
              <option value="chatgpt.com">ChatGPT</option>
              <option value="openai.com">OpenAI</option>
              <option value="www.anthropic.com">Anthropic</option>
              <option value="claude.ai">Claude</option>
              <option value="" disabled></option>
              <option value="" disabled>------- Search &amp; portals</option>
              <option value="www.bing.com">Bing</option>
              <option value="duckduckgo.com">DuckDuckGo</option>
              <option value="www.baidu.com">Baidu</option>
              <option value="ya.ru">Yandex</option>
              <option value="www.microsoft.com">Microsoft</option>
              <option value="www.apple.com">Apple</option>
              <option value="" disabled></option>
              <option value="" disabled>------- Media &amp; shopping</option>
              <option value="www.netflix.com">Netflix</option>
              <option value="open.spotify.com">Spotify</option>
              <option value="www.twitch.tv">Twitch</option>
              <option value="www.imdb.com">IMDb</option>
              <option value="www.ebay.com">eBay</option>
              <option value="www.pinterest.com">Pinterest</option>
              <option value="" disabled></option>
              <option value="" disabled>------- News</option>
              <option value="www.cnn.com">CNN</option>
              <option value="www.nytimes.com">New York Times</option>
              <option value="" disabled></option>
              <option value="" disabled>------- Dev &amp; tools</option>
              <option value="github.com">GitHub</option>
              <option value="stackoverflow.com">Stack Overflow</option>
              <option value="www.cloudflare.com">Cloudflare</option>
              <option value="www.adobe.com">Adobe</option>
              <option value="" disabled></option>
            </select>
          </div>
        </td>
      </tr>
    </table>
  </form>

  <div id="shredder-spinner" title="Shred it" onclick="shredPage();">
    <div class="blade"></div>
  </div>
</div>

<div id="display-wrap">
  <iframe id="display" name="display" src="welcome.html"></iframe>
</div>

<script>
// The toolbar plays the role of the original frameset's "Stoolbar" frame:
// child shred documents call parent.Stoolbar.loadPage()/pageLoaded().
var shredderVersion = 1.1;

var input = document.getElementById('shred-url-input');
var spinner = document.getElementById('shredder-spinner');
var display = document.getElementById('display');

function shredBookmark() {
  var sel = document.getElementById('bookmarks');
  var url = sel.options[sel.selectedIndex].value;
  if (url) shredURL(url, 'bookmark');
}
function resetList() {
  document.getElementById('bookmarks').selectedIndex = 0;
}
function shredPage() {
  shredURL(input.value, 'input');
}
function shredHost(u) {
  try { return new URL(/^https?:\/\//i.test(u) ? u : 'http://' + u).hostname; }
  catch (e) { return ''; }
}
// url = what was shredded; source = how they got there: 'input' (typed/spinner),
// 'bookmark' (picked from the list), or 'link' (clicked a link inside a shred)
function shredURL(url, source) {
  if (url && url.trim() !== '') {
    url = url.trim();
    input.value = url;
    spinner.classList.add('spinning');
    try {
      if (window.va) window.va('event', { name: 'shred', data: {
        url: url.slice(0, 200), host: shredHost(url), source: source || 'input'
      } });
    } catch (e) {}
    display.src = '/shred?frame=n&url=' + encodeURIComponent(url);
    setTimeout(pageLoaded, 30000);
  }
}
function loadPage(url) {
  resetList();
  shredURL(url, 'link');
}
function pageLoaded() {
  spinner.classList.remove('spinning');
}
function setLocationValue(url) {
  input.value = url;
}
function goWelcome() {
  display.src = 'welcome.html';
}

// expose the frame API the shred documents expect
window.Stoolbar = {
  loadPage: loadPage,
  pageLoaded: pageLoaded,
  setLocationValue: setLocationValue
};
// shred docs look for parent.Stoolbar — they get it since we're the parent.

input.focus({ preventScroll: true });
</script>

<!-- Vercel Web Analytics. Loaded only on this top-level page (not the welcome
     or shred iframes) so page views aren't double-counted. The script is served
     by Vercel at /_vercel/insights/script.js when Analytics is enabled. -->
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
